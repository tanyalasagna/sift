<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sift — Your Reflections</title>
  <link rel="stylesheet" href="history.css">
</head>
<body>

  <div class="header">
    <div class="header-logo">sift.</div>

    <div class="header-title">Your reflections</div>
    <div class="header-sub">Everything you've sifted through, all in one place.</div>
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" id="search-input" class="search-bar" placeholder="search past purchases, reflections, dates...">
    </div>
    <div class="filter-chips">
      <button class="filter-chip" data-pillar="money" type="button">Money</button>
      <button class="filter-chip" data-pillar="space" type="button">Space</button>
      <button class="filter-chip" data-pillar="need" type="button">Need</button>
    </div>
  </div>

  <div class="entries" id="entries"></div>

  <div class="footer">
    <div class="footer-count" id="footer-count"></div>
    <div class="footer-text">Everything here stays between you and you.</div>
    <div class="footer-logo">sift.</div>
  </div>

  <script src="history.js"></script>
</body>
</html>
