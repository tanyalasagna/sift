<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sift</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Happy+Monkey&family=Geist:wght@300;400;600&family=Geist+Mono:wght@600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="popup.css"/>
</head>
<body>

  <div class="main-card">

    <div class="logo-row">
      <span class="wordmark">sift.</span>
      <svg class="dots" viewBox="0 0 141 127" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="28"  cy="32"  r="15" fill="#e8c88d"/>
        <circle cx="75"  cy="20"  r="15" fill="#a8b99a"/>
        <circle cx="52"  cy="76"  r="15" fill="#c49a8a"/>
        <circle cx="108" cy="74"  r="15" fill="#b05538"/>
        <circle cx="22"  cy="107" r="15" fill="#5c3d2e"/>
      </svg>
    </div>

    <div class="question">
      <p class="question-main">What's on your mind?</p>
      <p class="question-sub">Pick what you care about</p>
    </div>

    <div class="pillars" id="pillars">
      <!-- Populated by popup.js -->
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
